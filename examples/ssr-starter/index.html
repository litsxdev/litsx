<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LitSX SSR Starter</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f6efe8, #fdfaf6);
        color: #1d231f;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 64px 24px 96px;
      }

      .status {
        margin-bottom: 16px;
        color: #6d776f;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      body[data-hydrated="true"] .status::after {
        content: "hydrated";
        color: #146b43;
      }

      body:not([data-hydrated="true"]) .status::after {
        content: "server rendered";
        color: #8a4c00;
      }
    </style>
    <!--app-head-->
  </head>
  <body>
    <main class="page">
      <div class="status">LitSX SSR status: </div>
      <!--app-html-->
    </main>
    <!--app-bootstrap-->
  </body>
</html>
