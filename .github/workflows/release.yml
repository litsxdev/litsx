name: Release

on:
  workflow_run:
    workflows:
      - Release Validate
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Detect Pending Release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.pending.outputs.has_changesets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Detect pending changesets
        id: pending
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print -quit | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish Packages
    needs: plan
    if: needs.plan.outputs.has_changesets == 'true'
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Materialize release versions
        run: corepack yarn changeset:version

      - name: Commit release version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No version updates to commit"
            exit 0
          fi
          git commit -m "chore(release): version packages [skip ci]"
          git push origin HEAD:main

      - name: Publish packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: corepack yarn release:publish

      - name: Create package tags
        run: node scripts/release/create-release-tags.mjs

      - name: Push package tags
        run: git push origin --tags
