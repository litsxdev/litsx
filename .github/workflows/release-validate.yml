name: Release Validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Release Surface
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Detect pending changesets
        id: pending
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print -quit | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Materialize release versions
        if: steps.pending.outputs.has_changesets == 'true'
        run: corepack yarn changeset:version

      - name: Refresh lockfile after versioning
        if: steps.pending.outputs.has_changesets == 'true'
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: corepack yarn install

      - name: Run release validation
        run: |
          corepack yarn release:check
          corepack yarn release:smoke:scaffolds
          corepack yarn release:test

  release-artifacts:
    name: Build Preview Artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Build npm tarballs
        run: corepack yarn release:artifacts

      - name: Upload npm tarballs
        uses: actions/upload-artifact@v6
        with:
          name: npm-release-artifacts
          path: .release-artifacts/npm/*.tgz
