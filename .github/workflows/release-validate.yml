name: Release Validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Run release validation
        run: |
          corepack yarn release:check
          corepack yarn release:smoke:scaffolds
          corepack yarn release:test

  release-artifacts:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Build npm tarballs
        run: corepack yarn release:artifacts

      - name: Build VS Code extension
        run: corepack yarn release:vscode:build

      - name: Package VSIX
        run: corepack yarn release:vscode:package

      - name: Upload npm tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-release-artifacts
          path: .release-artifacts/npm/*.tgz

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-artifact
          path: packages/vscode-litsx/dist/*.vsix
