name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare LitSX CodeQL overlay
        id: litsx
        if: matrix.language == 'javascript-typescript'
        uses: litsxdev/litsx-codeql-preprocess@v0

      - name: Initialize CodeQL for workflow analysis
        if: matrix.language == 'actions'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Initialize CodeQL for JavaScript/TypeScript
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config: ${{ steps.litsx.outputs.codeql_config }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
