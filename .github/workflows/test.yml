name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Run test suite with coverage
        run: corepack yarn coverage

      - name: Write coverage summary
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const summaryPath = "coverage/coverage-summary.json";
          const stepSummaryPath = process.env.GITHUB_STEP_SUMMARY;

          if (!fs.existsSync(summaryPath) || !stepSummaryPath) {
            process.exit(0);
          }

          const coverage = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
          const total = coverage.total;

          const lines = [
            "## Coverage",
            "",
            "| Metric | Coverage | Covered / Total |",
            "| --- | ---: | ---: |",
            `| Lines | ${total.lines.pct}% | ${total.lines.covered} / ${total.lines.total} |`,
            `| Statements | ${total.statements.pct}% | ${total.statements.covered} / ${total.statements.total} |`,
            `| Functions | ${total.functions.pct}% | ${total.functions.covered} / ${total.functions.total} |`,
            `| Branches | ${total.branches.pct}% | ${total.branches.covered} / ${total.branches.total} |`,
          ];

          fs.appendFileSync(stepSummaryPath, `${lines.join("\n")}\n`);
          EOF
