name: Backfill GitHub Releases

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional release commit SHA to backfill. Leave empty to process all release commits."
        required: false
        type: string
      dry_run:
        description: "Preview the GitHub releases without creating or updating them."
        required: true
        default: true
        type: boolean
      update:
        description: "Update existing GitHub releases if they already exist."
        required: true
        default: false
        type: boolean
      include_empty:
        description: "Include release commits that do not publish npmReleasePackages."
        required: true
        default: false
        type: boolean
      all_releases:
        description: "Required for non-dry-run backfills without a specific ref."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: backfill-github-releases-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preview:
    name: Preview GitHub Releases
    if: inputs.dry_run == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Preview backfill plan
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_UPDATE: ${{ inputs.update }}
          INPUT_INCLUDE_EMPTY: ${{ inputs.include_empty }}
        run: |
          set -euo pipefail

          args=("--dry-run")

          if [ -n "${INPUT_REF}" ]; then
            args+=("--ref=${INPUT_REF}")
          fi

          if [ "${INPUT_UPDATE}" = "true" ]; then
            args+=("--update")
          fi

          if [ "${INPUT_INCLUDE_EMPTY}" = "true" ]; then
            args+=("--include-empty")
          fi

          node scripts/release/backfill-github-releases.js "${args[@]}"

  apply:
    name: Backfill GitHub Releases
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: write
    steps:
      - name: Validate execution scope
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_ALL_RELEASES: ${{ inputs.all_releases }}
        run: |
          set -euo pipefail

          if [ -z "${INPUT_REF}" ] && [ "${INPUT_ALL_RELEASES}" != "true" ]; then
            echo "Non-dry-run backfill without a specific ref requires all_releases=true."
            exit 1
          fi

      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.LITSX_APP_CLIENT_ID }}
          private-key: ${{ secrets.LITSX_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-workflows: write

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Create and push global release tags
        env:
          RELEASE_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_INCLUDE_EMPTY: ${{ inputs.include_empty }}
        run: |
          set -euo pipefail

          mkdir -p .release-artifacts

          if [ -n "${INPUT_REF}" ]; then
            refs=("${INPUT_REF}")
          else
            mapfile -t refs < <(git log --grep='^chore(release): version packages \[skip ci\]$' --format='%H' --reverse)
          fi

          if [ "${#refs[@]}" -eq 0 ]; then
            echo "No release commits found"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_PUSH_TOKEN}@github.com/${{ github.repository }}.git"

          for ref in "${refs[@]}"; do
            payload_path=".release-artifacts/github-release-${ref}.json"
            node scripts/release/build-github-release.js --ref="${ref}" > "${payload_path}"

            package_count="$(node -e 'const fs=require("fs"); const release=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(Array.isArray(release.packages) ? release.packages.length : 0));' "${payload_path}")"
            if [ "${INPUT_INCLUDE_EMPTY}" != "true" ] && [ "${package_count}" = "0" ]; then
              echo "skip ${ref} (no public package releases)"
              continue
            fi

            tag_name="$(node -e 'const fs=require("fs"); const release=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(release.tagName);' "${payload_path}")"
            target_sha="$(node -e 'const fs=require("fs"); const release=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(release.targetCommitish);' "${payload_path}")"

            if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
              echo "Tag ${tag_name} already exists locally"
            else
              git tag -a "${tag_name}" "${target_sha}" -m "${tag_name}"
            fi

            git push origin "refs/tags/${tag_name}"
          done

      - name: Backfill GitHub releases
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_UPDATE: ${{ inputs.update }}
          INPUT_INCLUDE_EMPTY: ${{ inputs.include_empty }}
        run: |
          set -euo pipefail

          args=()

          if [ -n "${INPUT_REF}" ]; then
            args+=("--ref=${INPUT_REF}")
          fi

          if [ "${INPUT_UPDATE}" = "true" ]; then
            args+=("--update")
          fi

          if [ "${INPUT_INCLUDE_EMPTY}" = "true" ]; then
            args+=("--include-empty")
          fi

          node scripts/release/backfill-github-releases.js "${args[@]}"
