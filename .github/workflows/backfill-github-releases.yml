name: Backfill GitHub Releases

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional release commit SHA to backfill. Leave empty to process all release commits."
        required: false
        type: string
      dry_run:
        description: "Preview the GitHub releases without creating or updating them."
        required: true
        default: true
        type: boolean
      update:
        description: "Update existing GitHub releases if they already exist."
        required: true
        default: false
        type: boolean
      include_empty:
        description: "Include release commits that do not publish npmReleasePackages."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: backfill-github-releases-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill:
    name: Backfill GitHub Releases
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.LITSX_APP_CLIENT_ID }}
          private-key: ${{ secrets.LITSX_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Build GitHub release payload
        if: inputs.dry_run == false && inputs.ref != ''
        run: |
          mkdir -p .release-artifacts
          node scripts/release/build-github-release.js --ref="${{ inputs.ref }}" > .release-artifacts/github-release.json

      - name: Create and push global release tag
        if: inputs.dry_run == false && inputs.ref != ''
        env:
          RELEASE_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          node -e 'const fs=require("fs"); const release=JSON.parse(fs.readFileSync(".release-artifacts/github-release.json","utf8")); process.stdout.write(`${release.tagName}\n${release.targetCommitish}\n`);' > .release-artifacts/github-release-tag.txt
          mapfile -t release_tag_parts < .release-artifacts/github-release-tag.txt
          tag_name="${release_tag_parts[0]}"
          target_sha="${release_tag_parts[1]}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_PUSH_TOKEN}@github.com/${{ github.repository }}.git"

          if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
            echo "Tag ${tag_name} already exists locally"
          else
            git tag -a "${tag_name}" "${target_sha}" -m "${tag_name}"
          fi

          git push origin "refs/tags/${tag_name}"

      - name: Backfill GitHub releases
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_UPDATE: ${{ inputs.update }}
          INPUT_INCLUDE_EMPTY: ${{ inputs.include_empty }}
        run: |
          set -euo pipefail

          args=()

          if [ -n "${INPUT_REF}" ]; then
            args+=("--ref=${INPUT_REF}")
          fi

          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            args+=("--dry-run")
          fi

          if [ "${INPUT_UPDATE}" = "true" ]; then
            args+=("--update")
          fi

          if [ "${INPUT_INCLUDE_EMPTY}" = "true" ]; then
            args+=("--include-empty")
          fi

          node scripts/release/backfill-github-releases.js "${args[@]}"
