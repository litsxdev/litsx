<svg class="litsx-logo" width="144" height="40" viewBox="0 0 144 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Litsx">
  <defs>
    <linearGradient id="sxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="40%" stop-color="#6a5cff"/>
      <stop offset="60%" stop-color="#ff3d77"/>
      <stop offset="75%" stop-color="#ff8a00"/>
    </linearGradient>
  </defs>
  <style>
    .litsx-wordmark {
      fill: #1a1a1a;
    }

    @media (prefers-color-scheme: dark) {
      .litsx-wordmark {
        fill: #f3f4f6;
      }
    }
  </style>

  <text
    class="litsx-wordmark"
    x="0"
    y="31"
    font-family="Montserrat, Inter, ui-sans-serif, system-ui, sans-serif"
    font-weight="800"
    font-size="34"
    letter-spacing="-0.045em">
    Lit
    <tspan
      dx="-4"
      dy="-13"
      font-size="18"
      letter-spacing="-0.02em"
      fill="url(#sxGradient)">
      sx
    </tspan>
  </text>
</svg>
